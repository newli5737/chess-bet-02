version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: chess-bet-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: test1234
      POSTGRES_DB: chess_bet
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: chess-bet-redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data:
