# ── HTTP → HTTPS redirect ──────────────────────────────────
server {
    listen 80;
    server_name cotuong2.linguagerman.com;
    return 301 https://$host$request_uri;
}

# ── HTTPS — Next.js Frontend ───────────────────────────────
server {
    listen 443 ssl;
    server_name cotuong2.linguagerman.com;

    ssl_certificate     /etc/letsencrypt/live/cotuong2.linguagerman.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cotuong2.linguagerman.com/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Next.js app (port 3011)
    location / {
        proxy_pass         http://127.0.0.1:3011;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Next.js HMR / WebSocket (dev mode)
    location /_next/webpack-hmr {
        proxy_pass         http://127.0.0.1:3011;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
    }

    # Static assets — cache aggressively
    location /_next/static/ {
        proxy_pass         http://127.0.0.1:3011;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        expires            1y;
        add_header         Cache-Control "public, immutable";
    }
}
